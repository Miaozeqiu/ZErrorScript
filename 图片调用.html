<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>图片请求示例</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    img { max-width: 100%; border: 1px solid #ddd; padding: 8px; }
    .status { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="status" id="status">等待请求...</div>
  <img id="latex-img" alt="加载中..." />

  <script>
    async function loadLatexImage() {
      const statusEl = document.getElementById('status');
      const imgEl = document.getElementById('latex-img');
      const url = 'https://mooc1-api.chaoxing.com/ananas/latex/p/7563';

      try {
        if (!window.ZErrorScript || typeof window.ZErrorScript.request !== 'function') {
          statusEl.textContent = '未检测到跨域接口，请确认脚本已加载';
          return;
        }
        statusEl.textContent = '正在请求...';
        const res = await window.ZErrorScript.request({
          method: 'GET',
          url,
          responseType: 'arraybuffer'
        });

        if (res.status !== 200) {
          throw new Error('请求失败，状态码: ' + res.status);
        }

        const contentType = res.contentType || 'image/png';
        if (res.base64) {
          imgEl.src = 'data:' + contentType + ';base64,' + res.base64;
        } else if (res.responseText && res.responseText.trim()) {
          imgEl.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(res.responseText);
        } else {
          imgEl.src = url;
        }
        statusEl.textContent = '加载完成';
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        statusEl.textContent = '请求失败: ' + msg;
        console.error(err);
      }
    }

    loadLatexImage();
  </script>
</body>
</html>
